body:
  text: 傷寒舌鑑長洲張登撰白胎舌總論傷寒邪在皮毛初則舌有白沬次則白涎白滑再次白屑白疱有舌中舌尖舌根之不同是寒邪入經之微甚也舌乃心之苗心屬南方火當赤色今反見白色者是火不能制金也初則寒鬱皮膚毛竅不得疏通熱氣不得外泄故惡寒發熱在太陽經則頭痛身熱項背強腰脊痛等證傳至陽明經則有白屑滿舌雖證有煩躁如脈浮緊者猶當汗之在少陽經者則白胎白滑用小柴胡湯和之胃虚者理中湯温之如白色少變黄者大柴胡大小承氣分輕重下之白舌亦有死證不可忽視也黃胎舌總論黄胎者裏證也傷寒初病無此舌傳至少陽經亦無此舌直至陽明府實胃中火盛火乗土位故有此胎當分輕重瀉之初則微黄次則深黄有滑甚則乾黄焦黄也其證有大熱大渴便秘讝語痞結自利或因失汗發黄或畜血如狂皆濕熱太盛小便不利所致若目白如金身黄如橘宜茵蔯蒿湯五苓散梔子檗皮湯等如畜血在上焦犀角地黄湯中焦桃仁承氣湯下焦代抵當湯凡血證見血則愈切不可與冷水飲之必死大抵舌黄證雖重若脈長者中土有氣也下之則安如脈弦下利舌胎黄中有黑色者皆危證也黑胎舌總論傷寒五七日舌見黑胎最為危候表證皆無此舌如兩感一二日間見之必死若白胎上漸漸中心黑者是傷寒邪熱𫝊裏之候紅舌上漸漸黑者乃瘟疫𫝊變壊證將至也盖舌色本赤今見黑者乃水來尅火水極似火火過炭黑之理然有純黑有黑暈有刺有隔瓣有瓣底紅瓣底黑者大抵尖黑猶輕根黑最重如全黑者縱神丹亦難救療也灰色舌總論灰色舌有隂陽之異若直中隂經則即時舌便灰黑而無積胎若熱傳三隂必四五日表證罷而胎變灰色也有在根在尖在中者有渾舌俱灰黑者大抵傳經熱證則有灰黑乾胎皆當攻下泄熱若直中三隂之灰黑無胎者即當温經散寒又有畜血證其人如狂或瞑目讝語亦有不狂不語不知人事而面黑舌灰者當分輕重以攻其血切勿誤與冷水引領敗血入心而致不救也紅色舌總論夫紅舌者伏熱内畜於心胃自裏而達於表也仲景云冬傷於寒至春變為温病至夏變為熱病故舌紅而赤又有瘟疫疫癘一方之内老幼之病皆同者舌亦正赤而加積胎也若更多食則助熱内蒸故舌紅面赤甚者面目俱赤而舌瘡也然病有輕重舌有微甚且見於舌之根尖中下左右瘡蝕脹爛􅂒細長短種種異形皆瘟毒火熱藴化之所為也其所治亦不同當解者内解其毒當砭者砭去其血若論湯液無過大小承氣黄連解毒三黄石膏等比類而推可也紫色舌總論紫舌胎者酒後傷寒也或大醉露臥當風或已病而仍飲酒或感冒不服藥而用葱薑熱酒發汗汗雖出而酒熱留於心胞衝行經絡故舌見紫色而又有微白胎也胎結舌之根尖長短厚薄涎滑乾焦種種不同當㕘其源而治之黴醬色胎舌總論黴醬色胎者乃夾食傷寒一二日間即有此舌為寒傷太隂食停胃府之證輕者胎色亦薄雖腹痛不下利桂枝湯加橘半枳朴痛甚加大黄冷食不消加乾薑厚朴其胎色厚而腹痛甚不止者必危舌見醬色乃黄兼黑色為土邪𫝊水證必脣口乾燥大渴雖用下奪鮮有得愈者藍色胎舌總論藍色胎者乃肝木之色發見於外也傷寒病久已經汗下胃氣已傷致心火無氣胃土無依肺無所生木無所畏故乗膈上而見純藍色是金木相併火土氣絶之候是以必死如微藍或稍見藍紋猶可用温胃健脾調肝益肺藥治之如純藍色者是肝木獨盛無畏雖無他證必死妊娠傷寒舌總論妊娠傷寒邪入經絡輕則母病重則子傷枝傷果必墜理所必然故凡治此當先固其胎氣胎安則子母俱安面以候母舌以候子色澤則安色敗則斃面赤舌青者子死母活面舌俱青沬出者母子俱死亦有面舌俱白母子皆死者盖謂色不澤也傷寒舌鑑
