body:
  text: 傷寒舌鑑醫家類提要臣等謹案傷寒舌鑑一卷國朝張登撰登字誕先長洲人璐之子是書備列傷寒觀舌之法分白胎黒胎灰色紅色紫色徽醬色藍色八種末附妊娠傷寒舌為圖一百二十各有總論案舌白胎滑之説始見張機傷寒論而其法不詳後金鏡録推至三十六圖未為賅備觀舌心法衍至一百三十有七圖又頗病繁蕪登以己所閲厯參證于二書之間削繁正舛以成是編較之脉候隠微尤易考騐固論傷寒者所宜參取也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ae96d84c3d156cdb0fabe395347657bbadb03bc8eb6d6b3877d3e2fded4e2b78
